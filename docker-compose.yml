x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow_db/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
  volumes:
    - ./dags:/opt/airflow/dags
    - ./dbt:/usr/app/dbt
    - ./logs/airflow:/opt/airflow/logs
  depends_on:
    - airflow_db

services:
  postgres_db:
    image: postgres:15
    container_name: bsg_postgres_container
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: my_secret_password_123
      POSTGRES_DB: ecommerce_analytics
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d

  airflow_db:
    image: postgres:15
    container_name: bsg_airflow_db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_pgdata:/var/lib/postgresql/data

  airflow-init:
    <<: *airflow-common
    container_name: bsg_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - airflow db init && airflow users create --username admin --password admin --firstname Admin --lastname Admin --role Admin --email admin@example.com
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: bsg_airflow_webserver
    ports:
      - "8080:8080"
    command: webserver
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    container_name: bsg_airflow_scheduler
    command: scheduler
    restart: always

  etl_app:
    build: .
    container_name: bsg_etl_app
    depends_on:
      - postgres_db
    env_file:
      - .env

  metabase:
    image: metabase/metabase:latest
    container_name: bsg_metabase
    depends_on:
      - postgres_db
    ports:
      - "3000:3000"
    volumes:
      - metabase_data:/metabase-data
    environment:
      MB_DB_FILE: /metabase-data/metabase.db

  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.7.0
    container_name: bsg_dbt
    depends_on:
      - postgres_db
    volumes:
      - ./dbt:/usr/app/dbt
    working_dir: /usr/app/dbt
    environment:
      DBT_PROFILES_DIR: /usr/app/dbt
    entrypoint: ["tail", "-f", "/dev/null"]

volumes:
  pgdata:
  airflow_pgdata:
  metabase_data: