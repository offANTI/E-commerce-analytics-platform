version: '3.8'

services:
  postgres_db:
    image: postgres:15
    container_name: bsg_postgres_container
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: my_secret_password_123
      POSTGRES_DB: ecommerce_analytics
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d


  etl_app:
    build: .
    container_name: bsg_etl_app
    depends_on:
      - postgres_db
    env_file:
      - .env


  metabase:
    image: metabase/metabase:latest
    container_name: bsg_metabase
    depends_on:
      - postgres_db
    ports:
      - "3000:3000"
    volumes:
      - metabase_data:/metabase-data
    environment:
      MB_DB_FILE: /metabase-data/metabase.db


  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.7.0
    container_name: bsg_dbt
    depends_on:
      - postgres_db
    volumes:
      - ./dbt:/usr/app/dbt
    working_dir: /usr/app/dbt
    environment:
      DBT_PROFILES_DIR: /usr/app/dbt
    entrypoint: ["tail", "-f", "/dev/null"]
volumes:
  pgdata:
  metabase_data: