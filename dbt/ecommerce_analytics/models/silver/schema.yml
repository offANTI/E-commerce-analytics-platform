version: 2

models:
  - name: silver_orders
    description: "Cleaned orders from bronze layer"
    columns:
      - name: order_id
        description: "Primary key"
        tests:
          - unique
          - not_null
      - name: user_id
        tests:
          - not_null
      - name: total_amount
        tests:
          - not_null
      - name: store_name
        tests:
          - not_null
          - accepted_values:
              values: ['DummyJSON', 'Escuela']

  - name: silver_products
    columns:
      - name: id
        tests:
          - unique
          - not_null
      - name: price
        tests:
          - not_null

  - name: silver_users
    columns:
      - name: id
        tests:
          - unique
          - not_null
      - name: email
        tests:
          - unique
          - not_null

  - name: price
    tests:
      - not_null:
          config:
            severity: warn

