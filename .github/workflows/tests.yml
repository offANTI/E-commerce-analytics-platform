name: Testson:  push:    branches: [main]  pull_request:    branches: [main]jobs:  test:    runs-on: ubuntu-latest    env:      DB_HOST: localhost      DB_NAME: test_db      DB_USER: test_user      DB_PASSWORD: test_password      DUMMY_PRODUCTS_URL: https://dummyjson.com/products      DUMMY_CATEGORIES_URL: https://dummyjson.com/products/categories      ESCUELA_PRODUCTS_URL: https://api.escuelajs.co/api/v1/products      ESCUELA_CATEGORIES_URL: https://api.escuelajs.co/api/v1/categories      ESCUELA_USERS_URL: https://api.escuelajs.co/api/v1/users      PYTHONPATH: ${{ github.workspace }}/src:${{ github.workspace }}    steps:      - uses: actions/checkout@v4      - uses: actions/setup-python@v5        with:          python-version: '3.11'      - name: Install dependencies        run: pip install -r requirements.txt      - name: Run tests        run: pytest tests/ -v